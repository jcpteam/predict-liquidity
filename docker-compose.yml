services:
  app:
    build: .
    container_name: pm-liquidity
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - PORT=8000
      - WORKERS=2
    volumes:
      - pm-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/markets"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pm-data:
